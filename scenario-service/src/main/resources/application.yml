server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scenarios}
    username: ${SPRING_DATASOURCE_USERNAME:scenario}
    password: ${SPRING_DATASOURCE_PASSWORD:scenario123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: scenario-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        # topicPattern=".*" uses regex subscription — Kafka rediscovers topics via
        # metadata refresh. Default is 5 min; drop to 10s so new topics are picked up fast.
        metadata.max.age.ms: 10000
        # Reduce max wait time for fetch requests so signals reach Temporal quickly
        fetch.max.wait.ms: 100
        # Heartbeat more frequently to detect consumer lag early
        heartbeat.interval.ms: 1000
        session.timeout.ms: 10000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

temporal:
  connection:
    target: ${TEMPORAL_ADDRESS:localhost:7233}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.demo: DEBUG
    io.temporal: INFO
