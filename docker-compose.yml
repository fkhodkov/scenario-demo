version: '3.8'

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ─── PostgreSQL (scenario definitions) ───────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: scenarios
      POSTGRES_USER: scenario
      POSTGRES_PASSWORD: scenario123
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─── ScyllaDB (Temporal persistence) ──────────────────────────────────────
  scylla:
    image: scylladb/scylla:5.4
    ports: ["9042:9042"]
    command: --developer-mode=1
    volumes:
      - scylla_data:/var/lib/scylla

  # ─── Temporal server (Cassandra/Scylla backend) ───────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    depends_on: [scylla]
    ports: ["7233:7233"]
    environment:
      DB: cassandra
      CASSANDRA_SEEDS: scylla
      CASSANDRA_PORT: 9042
      TEMPORAL_ADDRESS: temporal:7233
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-cass.yaml
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig

  temporal-ui:
    image: temporalio/ui:2.26.2
    depends_on: [temporal]
    ports: ["8088:8080"]
    environment:
      TEMPORAL_ADDRESS: temporal:7233

  # ─── Application services ─────────────────────────────────────────────────
  scenario-service:
    build: ./scenario-service
    depends_on: [postgres, kafka, temporal]
    ports: ["8080:8080"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scenarios
      SPRING_DATASOURCE_USERNAME: scenario
      SPRING_DATASOURCE_PASSWORD: scenario123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TEMPORAL_ADDRESS: temporal:7233

  simulator-service:
    build: ./simulator-service
    depends_on: [kafka, scenario-service]
    ports: ["8081:8081"]
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCENARIO_SERVICE_URL: http://scenario-service:8080

  scenario-editor:
    build: ./scenario-editor
    depends_on: [scenario-service]
    ports: ["3000:80"]

volumes:
  postgres_data:
  scylla_data:
